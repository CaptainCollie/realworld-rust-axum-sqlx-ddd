services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conduit
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: always
    volumes:
      - ./backups:/backups
    depends_on:
      - db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=conduit
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_SUFFIX=.sql.gz

  app:
    build: .
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/conduit}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-20}
      DB_MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS:-5}
      DB_ACQUIRE_TIMEOUT_SEC: ${DB_ACQUIRE_TIMEOUT_SEC:-30}
      DB_IDLE_TIMEOUT_SEC: ${DB_IDLE_TIMEOUT_SEC:-600}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-12345}
      JWT_EXP_HOURS: ${JWT_EXP_HOURS:-24}
      IS_DOCKER: true

      RUST_LOG: ${RUST_LOG:-info,sqlx=debug}
    restart: always
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki
      - prometheus
