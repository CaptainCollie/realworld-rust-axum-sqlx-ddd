name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate Coverage Data
        run: |
          cargo tarpaulin --jobs 1 --ignore-tests --exclude-files src/main.rs src/lib.rs --out Lcov
          PERCENT=$(cargo tarpaulin --jobs 1 --ignore-tests --exclude-files src/main.rs src/lib.rs | grep -oP '\d+(\.\d+)?(?=% coverage)' | tail -1)
          echo "COVERAGE_PERCENT=$PERCENT" >> $GITHUB_ENV
        env:
          SQLX_OFFLINE: true
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-12345' }}

      - name: Update Gist Badge Data
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 02c38543ff4eaac85073d678de8da865
          filename: gistfile1.txt
          label: Coverage
          message: ${{ env.COVERAGE_PERCENT }}%
          valColorRange: ${{ env.COVERAGE_PERCENT }}
          maxColorRange: 100
          minColorRange: 0

      # - name: Upload to Codecov
      #   uses: codecov/codecov-action@v4
