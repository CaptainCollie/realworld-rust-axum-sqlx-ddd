jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Build Binary
        run: cargo build --all-targets --all-features
        env:
          SQLX_OFFLINE: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: target-folder
          path: |
            target
            Cargo.lock
          retention-days: 1

  quality-and-tests:
    name: Checks & Coverage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Download Build Artifacts
        uses: actions/artifact@v4
        with:
          name: target-folder

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          SQLX_OFFLINE: true

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate Coverage
        run: |
          cargo tarpaulin --jobs 1 --ignore-tests --exclude-files src/main.rs src/lib.rs --out Lcov | tee tarpaulin_log.txt
        env:
          SQLX_OFFLINE: true
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-12345' }}

      - name: Update Gist Badge Data
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 02c38543ff4eaac85073d678de8da865
          filename: gistfile1.txt
          label: Coverage
          message: ${{ env.COVERAGE_PERCENT }}%
          valColorRange: ${{ env.COVERAGE_PERCENT }}
          maxColorRange: 100
          minColorRange: 0

