name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Security Audit
        run: |
          cargo install cargo-audit
          cargo audit --ignore RUSTSEC-2023-0071 # No fixed upgrade is available!

  build-and-test:
    needs: lint-and-audit
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install sqlx-cli
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://githubusercontent.com | bash
          cargo binstall sqlx-cli --version 0.8.6 -y

      - name: Verify SQLx Metadata
        run: cargo sqlx prepare --check -- --all-targets

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate Coverage Data
        run: |
          cargo tarpaulin --jobs 1 --ignore-tests --exclude-files src/main.rs src/lib.rs --out Lcov | tee tarpaulin_log.txt
          PERCENT=$(grep -oP '\d+(\.\d+)?(?=% coverage)' tarpaulin_log.txt | tail -1)
          echo "COVERAGE_PERCENT=$PERCENT" >> $GITHUB_ENV
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-12345' }}

      - name: Update Gist Badge Data
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 02c38543ff4eaac85073d678de8da865
          filename: coverage.json
          label: Coverage
          message: ${{ env.COVERAGE_PERCENT }}%
          valColorRange: ${{ env.COVERAGE_PERCENT }}
          maxColorRange: 100
          minColorRange: 0
