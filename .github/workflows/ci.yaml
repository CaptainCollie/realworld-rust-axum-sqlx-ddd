name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-coverage:
    env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          SQLX_OFFLINE: true

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Security Audit
        run: |
          cargo install cargo-audit
          cargo audit

      - name: Verify SQLx Metadata
        run: cargo sqlx prepare --check -- --all-targets
        env:
          SQLX_OFFLINE: true

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate Coverage Data
        run: |
          cargo tarpaulin --jobs 1 --ignore-tests --exclude-files src/main.rs src/lib.rs --out Lcov | tee tarpaulin_log.txt
          PERCENT=$(grep -oP '\d+(\.\d+)?(?=% coverage)' tarpaulin_log.txt | tail -1)
          echo "COVERAGE_PERCENT=$PERCENT" >> $GITHUB_ENV
        env:
          SQLX_OFFLINE: true
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-12345' }}

      - name: Update Gist Badge Data
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 02c38543ff4eaac85073d678de8da865
          filename: gistfile1.txt
          label: Coverage
          message: ${{ env.COVERAGE_PERCENT }}%
          valColorRange: ${{ env.COVERAGE_PERCENT }}
          maxColorRange: 100
          minColorRange: 0

      # - name: Upload to Codecov
      #   uses: codecov/codecov-action@v4
      #   continue-on-error: true
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     files: lcov.info
